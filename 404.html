<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page not found — CashLab</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="images/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png" />
<style>
  :root { --gold:#c89f3b; --gold-deep:#a8842c; --ink:#0e0e0d; --muted:#6a6a66; --hairline:#d9d8d3; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    min-height:100dvh; display:grid; place-items:center; text-align:center;
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    color:var(--ink); background:#fff; padding:2rem; line-height:1.6;
  }
  img { width:120px; height:auto; margin:0 auto 2rem; }
  h1 { font-size:clamp(1.75rem,1.2rem+2vw,2.5rem); letter-spacing:-0.02em; margin-bottom:0.75rem; }
  p { color:var(--muted); max-width:42ch; margin:0 auto 2rem; }
  .code { color:var(--gold-deep); font-weight:700; letter-spacing:0.1em; font-size:0.8125rem; text-transform:uppercase; margin-bottom:1rem; }
  a.home {
    display:inline-block; font-weight:600; color:var(--ink); text-decoration:none;
    padding:0.65rem 1.25rem; border:1px solid var(--hairline); border-radius:6px; transition:border-color .2s,color .2s;
  }
  a.home:hover { border-color:var(--gold); color:var(--gold-deep); }
</style>
</head>
<body>
  <main>
    <img src="images/cashlab-mark-web.png" alt="CashLab" />
    <p class="code">Error 404</p>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or may have moved.</p>
    <a class="home" href="/">&larr; Back to home</a>
  </main>
</body>
</html>
